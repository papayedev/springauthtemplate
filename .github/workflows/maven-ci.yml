name: CI/CD Maven Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Configuration de Java (JDK 22)
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      - name: Build Maven (sans tests)
        run: mvn clean package -DskipTests

      - name: Mise en cache des artefacts de build
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: target/
          retention-days: 1

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    environment: test

    env:
      SMTP_HOST_TEST: ${{ secrets.SMTP_HOST_TEST }}
      SMTP_PORT_TEST: ${{ secrets.SMTP_PORT_TEST }}
      SMTP_USER_TEST: ${{ secrets.SMTP_USER_TEST }}
      SMTP_PASSWORD_TEST: ${{ secrets.SMTP_PASSWORD_TEST }}
      ACCESS_TOKEN_SECRET_TEST: ${{ secrets.ACCESS_TOKEN_SECRET_TEST }}
      ACCESS_TOKEN_EXPIRATION_TEST: ${{ secrets.ACCESS_TOKEN_EXPIRATION_TEST }}
      REFRESH_TOKEN_SECRET_TEST: ${{ secrets.REFRESH_TOKEN_SECRET_TEST }}
      REFRESH_TOKEN_EXPIRATION_TEST: ${{ secrets.REFRESH_TOKEN_EXPIRATION_TEST }}

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Configuration de Java (JDK 22)
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      - name: Récupération des artefacts de build
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: target/

      - name: Lancement des tests avec le profil test
        run: mvn test -Dspring.profiles.active=test

      - name: Publication des rapports de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          retention-days: 7