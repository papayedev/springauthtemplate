spring:
  config:
    activate:
      on-profile: prod
  docker:
    compose:
      enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/mydatabase
    username: myuser
    password: secret
    driver-class-name: org.postgresql.Driver
  application:
    name: api
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    check-location: true
    baseline-on-migrate: true
    validate-on-migrate: true
    enabled: true
    locations: classpath:db/migration
    placeholder-replacement: false
  mail:
    host: ${SMTP_HOST_PRD}
    port: ${SMTP_PORT_PRD}
    username: ${SMTP_USER_PRD}
    password: ${SMTP_PASSWORD_PRD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
jwt:
  access:
    secret: ${ACCESS_TOKEN_SECRET_PRD}
    expiration: ${ACCESS_TOKEN_EXPIRATION_PRD}
  refresh:
    secret: ${REFRESH_TOKEN_SECRET_PRD}
    expiration: ${REFRESH_TOKEN_EXPIRATION_PRD}
logging:
  level:
    root: INFO
    org.flywaydb: INFO
    jakarta.mail: DEBUG
management:
  endpoints:
    web:
      exposure:
        include: ["prometheus"]
  metrics:
    tags:
      application: ${spring.application.name}

