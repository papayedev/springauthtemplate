  spring:
    config:
      activate:
        on-profile: test
    application:
      name: api
    mail:
      host: ${SMTP_HOST_TEST}
      port: ${SMTP_PORT_TEST}
      username: ${SMTP_USER_TEST}
      password: ${SMTP_PASSWORD_TEST}
      properties:
        mail:
          smtp:
            auth: true
            starttls:
              enable: true
    jpa:
      hibernate:
        ddl-auto: none
    flyway:
      check-location: true
      baseline-on-migrate: true
      validate-on-migrate: true
      enabled: true
      locations: classpath:db/migration
      placeholder-replacement: false
  jwt:
    access:
      secret: ${ACCESS_TOKEN_SECRET_TEST}
      expiration: ${ACCESS_TOKEN_EXPIRATION_TEST}
    refresh:
      secret: ${REFRESH_TOKEN_SECRET_TEST}
      expiration: ${REFRESH_TOKEN_EXPIRATION_TEST}
  logging:
    level:
      root: INFO
      org.flywaydb: INFO

